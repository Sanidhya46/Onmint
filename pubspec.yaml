name: onmint
description: "Healthcare platform connecting patients with doctors, nurses, ambulance services, pharmacies, and labs"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  
  # HTTP & API
  dio: ^5.4.3
  
  # Local Storage
  shared_preferences: ^2.2.3
  
  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  
  # UI Components
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  carousel_slider: ^5.0.0
  flutter_rating_bar: ^4.0.1
  
  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
